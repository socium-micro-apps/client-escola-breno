# =============================================================================
# Production stack — __SLUG__
# =============================================================================
# Vai para /opt/socium-sf/clients/__SLUG__/docker-compose.yml na VPS.
# Atualizado a cada deploy pelo CI (que muda IMAGE_TAG no .env).
#
# Default: 1 serviço web exposto em __SUBDOMAIN__.
#
# Padrões para EXPANDIR a stack conforme a app real:
#   - Backend separado em api.__SUBDOMAIN__   → ver bloco comentado abaixo
#   - Banco de dados Postgres                  → ver bloco comentado abaixo
#   - Workers/jobs sem porta exposta           → adicione service sem labels traefik
#   - Cache Redis, Mongo, etc.                 → idem: rede internal apenas
# Sempre: TODOS os serviços que recebem tráfego HTTP precisam da rede
# `traefik-public` + labels `traefik.enable=true`. Volumes nomeados com
# prefixo `__SLUG___` para isolamento.

services:
  web:
    image: ghcr.io/__ORG__/client-__SLUG__-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - traefik-public
      # - internal       # descomente se houver serviços internos (backend, db)
    # environment:
    #   - NODE_ENV=production
    #   - API_URL=https://api.__SUBDOMAIN__
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.__SLUG__.rule=Host(`__SUBDOMAIN__`)"
      - "traefik.http.routers.__SLUG__.entrypoints=websecure"
      - "traefik.http.routers.__SLUG__.tls.certresolver=letsencrypt"
      - "traefik.http.routers.__SLUG__.middlewares=security-headers@docker"
      - "traefik.http.services.__SLUG__.loadbalancer.server.port=80"
      # Ajuste server.port acima para a porta que sua app escuta dentro do container

  # ----- Exemplos a expandir -----------------------------------------------
  #
  # api:
  #   image: ghcr.io/__ORG__/client-__SLUG__-api:${IMAGE_TAG:-latest}
