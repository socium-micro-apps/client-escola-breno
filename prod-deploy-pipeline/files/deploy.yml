# =============================================================================
# Production deploy pipeline — __SLUG__
# =============================================================================
# Vai para .github/workflows/deploy.yml no repo da app.
#
# A cada push em main:
#   1) Builda imagem(ns), publica no ghcr.io
#   2) Garante que o diretório do cliente existe na VPS
#   3) Sincroniza docker-compose.yml e .env.example (fonte da verdade: este repo)
#   4) Cria .env na primeira vez (copiando .env.example); pushes seguintes
#      preservam o .env existente — operador edita uma vez se a app tem segredos
#   5) Atualiza IMAGE_TAG no .env e roda `docker compose pull && up -d`
#
# Para apps multi-imagem (frontend + backend separados), duplique o step
# "Build and push" abaixo trocando context, file e nome da imagem.

name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_WEB: ${{ github.repository }}-web
  CLIENT_DIR: /opt/socium-sf/clients/__SLUG__

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set SHA short
        id: meta
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .                         # ajustar se o Dockerfile não está na raiz
          file: ./Dockerfile                 # ajustar se o nome/caminho for outro
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:sha-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure client dir exists on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: mkdir -p ${{ env.CLIENT_DIR }}

      - name: Sync stack files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml,.env.example"
          target: ${{ env.CLIENT_DIR }}

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ env.CLIENT_DIR }}
            # Primeira vez: cria .env a partir do .env.example.
            # Pushes seguintes: preserva o .env existente (operador pode ter editado segredos).
            if [ ! -f .env ]; then
              cp .env.example .env
              chmod 600 .env
              echo "First deploy: .env created from .env.example. If your app needs extra secrets, edit it now."
            fi
            # Atualiza apenas IMAGE_TAG (não toca em outros valores do .env)
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=sha-${{ needs.build-and-push.outputs.sha }}/" .env
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
